services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: locadora-app
    volumes:
      - .:/var/www/html
    ports:
      - "8000:8000"
      - "5173:5173"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - locadora

  mysql:
    image: mysql:8.0
    container_name: locadora-mysql
    environment:
      MYSQL_DATABASE: locadora
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: locadora
      MYSQL_PASSWORD: locadora
    ports:
      - "3306:3306"
    volumes:
      - locadora_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - locadora

  redis:
    image: redis:7-alpine
    container_name: locadora-redis
    ports:
      - "6379:6379"
    volumes:
      - locadora_redis_data:/data
    networks:
      - locadora

volumes:
  locadora_mysql_data:
  locadora_redis_data:

networks:
  locadora:
    driver: bridge
